<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>图片处理工具 - 裁剪与压缩</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>图片处理工具</h1>
      <p>功能：裁剪 9:16 → 1:1；压缩至 720p、约 100KB；导出 WebP/PNG</p>
    </header>

    <main class="app-main">
      <section class="panel">
        <div class="upload-area" id="dropzone">
          <input id="fileInput" type="file" accept="image/*" multiple />
          <p>点击选择图片或将图片拖拽到此处（支持多选）</p>
          <small id="fileInfo">未选择图片</small>
        </div>

        <div class="file-list-container" id="fileListContainer" style="display:none;">
          <h4>待处理列表 <small id="listCount"></small></h4>
          <div class="file-list" id="fileList">
            <!-- JS will populate this -->
          </div>
          <div class="batch-actions">
            <button id="btnClear" class="btn-secondary">清空列表</button>
          </div>
        </div>

        <div class="controls">
          <fieldset class="field-group">
            <legend>处理选项</legend>
            <label class="checkbox">
              <input id="optCrop" type="checkbox" checked />
              <span>裁剪（按比例 / 自由裁剪）</span>
            </label>
            <div class="sub-option" id="cropModeContainer">
              <label for="cropMode">裁剪模式：</label>
              <select id="cropMode">
                <option value="9:16">9:16</option>
                <option value="1:1" selected>1:1</option>
                <option value="3:4">3:4</option>
                <option value="free">自由裁剪</option>
              </select>
              <button id="btnResetCrop" class="btn-secondary btn-xs" type="button" style="display:none;">重置选区</button>
            </div>
            <div class="sub-option" id="cropAlignContainer">
              <label for="cropAlign">对齐方式：</label>
              <select id="cropAlign">
                <option value="top">顶部对齐</option>
                <option value="center" selected>居中对齐</option>
                <option value="bottom">底部对齐</option>
              </select>
            </div>
            <div class="sub-option hint" id="cropHint" style="display:none;">
              自由裁剪：在“原图预览”上按住拖拽选择区域（每张图可单独设置）。
            </div>
            
            <label class="checkbox">
              <input id="optCompress" type="checkbox" checked />
              <span>压缩到 720p（最长边 1280）并尽量接近 100KB</span>
            </label>
          </fieldset>

          <fieldset class="field-group">
            <legend>压缩参数（可选）</legend>
            <label class="inline">
              目标大小（KB）
              <input id="targetKb" type="number" min="30" max="500" step="5" value="100" />
            </label>
            <label class="inline">
              最长边（px）
              <input id="maxSide" type="number" min="512" max="4096" step="64" value="1280" />
            </label>
          </fieldset>

          <fieldset class="field-group">
            <legend>导出格式</legend>
            <select id="format">
              <option value="image/webp" selected>WebP（推荐）</option>
              <option value="image/png">PNG</option>
            </select>
          </fieldset>

          <div class="actions">
            <button id="btnProcess" disabled>开始处理所有图片</button>
            <a id="btnDownloadAll" class="btn" style="display:none;" href="javascript:void(0)">下载所有结果</a>
          </div>

          <div class="tips">
            <small>
              说明：PNG 无法通过质量参数控制大小，如需更小体积建议选择 WebP。
              <br>注意：批量下载时可能会被浏览器拦截弹窗，请允许。
            </small>
          </div>
        </div>
      </section>

      <section class="panel preview" id="previewPanel" style="display:none;">
        <div class="preview-col">
          <h3>原图预览 <span id="previewName"></span></h3>
          <canvas id="canvasSrc"></canvas>
        </div>
        <div class="preview-col">
          <h3>结果预览</h3>
          <canvas id="canvasOut"></canvas>
          <div class="meta" id="metaOut"></div>
        </div>
        <div class="preview-nav-side">
          <button id="previewPrev" class="btn-secondary btn-xl" type="button" title="上一张">←</button>
          <button id="previewNext" class="btn-secondary btn-xl" type="button" title="下一张">→</button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <small>本工具在浏览器本地进行处理，不会上传图片。</small>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="./app.js" defer></script>
  </body>
  </html>
